<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSIP KELAM | Koleksi Horor Nyata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Special+Elite&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood: #8b0000;
            --void: #050505;
            --panel: #0f0f0f;
        }

        body {
            background-color: var(--void);
            color: #ccc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Typography */
        .font-horror { font-family: 'Creepster', cursive; }
        .font-title { font-family: 'Nosifer', sans-serif; }
        .font-typewriter { font-family: 'Special Elite', serif; }

        /* Effects */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 50;
        }

        .flicker { animation: flicker 4s linear infinite; }
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.2; }
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(139, 0, 0, 0.1);
            position: fixed;
            top: 0; z-index: 60;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline { 0% { top: -5%; } 100% { top: 100%; } }

        /* Story Card */
        .story-card {
            background: var(--panel);
            border: 1px solid #1a1a1a;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .story-card:hover {
            border-color: var(--blood);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 15px rgba(139,0,0,0.2);
        }

        /* Modal Customization */
        .modal-backdrop {
            backdrop-filter: blur(12px) grayscale(1);
            transition: opacity 0.3s ease;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--blood); }
    </style>
</head>
<body class="selection:bg-red-950 selection:text-red-200">
    <div class="vignette"></div>
    <div class="scanline"></div>

    <header class="relative h-[50vh] flex items-center justify-center border-b border-red-950/50 overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')] opacity-30"></div>
        <div class="relative z-10 text-center px-4">
            <h1 class="font-title text-5xl md:text-7xl text-red-800 mb-4 flicker tracking-tighter">ARSIP KELAM</h1>
            <p class="font-horror text-lg md:text-2xl text-zinc-500 tracking-[0.3em] uppercase">Membuka Tabir yang Tak Terlihat</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20 relative z-20">
        <div id="story-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full flex flex-col items-center py-20 opacity-20">
                <div class="w-12 h-12 border-4 border-red-900 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-typewriter uppercase tracking-widest">Memanggil Manifestasi...</p>
            </div>
        </div>
    </main>

    <div id="storyModal" class="fixed inset-0 z-[100] hidden modal-backdrop overflow-y-auto pt-10 pb-20 px-4">
        <div class="max-w-3xl mx-auto bg-[#080808] border border-zinc-800 shadow-2xl rounded-sm relative">
            <button onclick="closeModal()" class="absolute -top-12 right-0 text-zinc-500 hover:text-red-600 text-4xl transition-colors">&times;</button>
            <div id="modal-body" class="p-8 md:p-16">
                </div>
        </div>
    </div>

    <footer class="border-t border-zinc-900 py-20 text-center relative z-20">
        <p class="text-zinc-600 text-[10px] font-typewriter tracking-[0.5em] uppercase mb-8">© MMXXVI ARSIP KELAM - TERKUNCI DALAM KEGELAPAN</p>
        <button onclick="toggleAdmin()" class="group inline-flex flex-col items-center gap-2 opacity-30 hover:opacity-100 transition-all">
            <span class="text-red-800 text-xs font-horror tracking-widest group-hover:block hidden">TAMBAH ARSIP</span>
            <div class="w-8 h-8 flex items-center justify-center border border-red-900 rounded-full">
                <span class="text-red-700">+</span>
            </div>
        </button>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXVkfvA5OK72TCanF2nTYnhKV0aHuIXQvIKuoQQfUrkIHQXwOeNJ3Vv7UILtanIvQz092KXWLb3zHM/pub?gid=1947422381&single=true&output=csv";
        const FALLBACK_IMG = "https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=800";

        function formatImg(url) {
            if (!url) return FALLBACK_IMG;
            const driveId = url.match(/(?:\/d\/|id=)([\w-]+)/);
            return driveId ? `https://drive.google.com/uc?export=view&id=${driveId[1]}` : url;
        }

        async function init() {
            const grid = document.getElementById('story-grid');
            try {
                const res = await fetch(SHEET_URL);
                const data = await res.text();
                const stories = parseCSV(data);
                render(stories);
            } catch (err) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-900 font-typewriter uppercase">Koneksi Ghaib Terputus...</p>`;
            }
        }

        function parseCSV(csv) {
            const lines = csv.split(/\r?\n/);
            return lines.slice(1).map(line => {
                // Regex simple untuk handle koma di dalam kutipan
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (parts.length < 7) return null;
                return {
                    judul: parts[2]?.replace(/"/g, ''),
                    konten: parts[3]?.replace(/"/g, ''),
                    episode: parts[4]?.replace(/"/g, '') || "??",
                    gambar: formatImg(parts[6]?.replace(/"/g, ''))
                };
            }).filter(s => s && s.judul);
        }

        function render(stories) {
            const grid = document.getElementById('story-grid');
            grid.innerHTML = stories.map((s, i) => `
                <article class="story-card group cursor-pointer" onclick='openModal(${JSON.stringify(s).replace(/'/g, "&apos;")})'>
                    <div class="aspect-video overflow-hidden bg-zinc-900">
                        <img src="${s.gambar}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" loading="lazy" onerror="this.src='${FALLBACK_IMG}'">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] text-red-800 font-bold tracking-[0.3em] uppercase">EP. ${s.episode}</span>
                            <div class="h-1 w-1 bg-red-600 rounded-full animate-pulse"></div>
                        </div>
                        <h2 class="font-horror text-2xl text-zinc-100 group-hover:text-red-700 transition-colors uppercase leading-tight">${s.judul}</h2>
                    </div>
                </article>
            `).join('');
        }

        function openModal(s) {
            const modal = document.getElementById('storyModal');
            const content = `
                <div class="text-center mb-10">
                    <p class="text-red-700 font-horror tracking-[0.5em] mb-2 uppercase">Dokumen ${s.episode}</p>
                    <h2 class="font-title text-3xl md:text-4xl text-white uppercase">${s.judul}</h2>
                    <div class="h-px w-20 bg-red-900/50 mx-auto mt-6"></div>
                </div>
                <div class="font-typewriter text-zinc-400 text-lg leading-relaxed space-y-4">
                    ${s.konten.replace(/\n/g, '<br>')}
                </div>
            `;
            document.getElementById('modal-body').innerHTML = content;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('storyModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close on ESC
        document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeModal(); });

        function toggleAdmin() {
            window.open("https://forms.gle/Qj3w5AWcEe5hZK768", "_blank");
        }

        window.onload = init;
    </script>
</body>
</html>
