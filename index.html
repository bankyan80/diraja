<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diraja Tabs Store - Spek Premium & Harga Merakyat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #003366;
            --sky-blue: #3399ff;
            --gold: #d4af37;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #001a33;
            color: #fff;
            overflow-x: hidden;
        }

        .mega-mendung-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(51, 153, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 51, 102, 0.4) 0%, transparent 40%);
            opacity: 0.8;
        }

        .mega-mendung-pattern {
            position: absolute; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200"><path d="M0 100 Q50 50 100 100 T200 100 T300 100 T400 100" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="2"/></svg>');
            background-size: 600px 300px;
            animation: moveClouds 60s linear infinite;
        }

        @keyframes moveClouds {
            from { background-position: 0 0; }
            to { background-position: 600px 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-8px);
        }

        .royal-text {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(to right, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-diraja {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #001a33;
            font-weight: 700;
            transition: 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-tab {
            cursor: pointer;
            padding: 8px 24px;
            border-radius: 50px;
            transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.7rem;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        .category-tab.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .sort-tab {
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 10px;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
        }

        .sort-tab.active {
            color: var(--gold);
            background: rgba(255, 255, 255, 0.05);
        }

        .carousel-btn {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }
        
        .glass-card:hover .carousel-btn {
            opacity: 1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body onload="initApp()">

    <div class="mega-mendung-bg">
        <div class="mega-mendung-pattern"></div>
    </div>

    <!-- Header -->
    <header class="container mx-auto px-6 py-16 text-center">
        <h1 class="text-5xl md:text-8xl royal-text font-bold mb-6 tracking-tight">Diraja Tabs Store</h1>
        <p class="text-blue-200/80 text-lg md:text-2xl max-w-2xl mx-auto italic font-light">Koleksi Tablet Pilihan dengan Spek Diraja</p>
    </header>

    <!-- Nav & Filters -->
    <div class="container mx-auto px-4 mb-12">
        <div class="flex flex-col items-center space-y-6">
            <nav class="flex gap-4 overflow-x-auto pb-4 no-scrollbar justify-start md:justify-center w-full max-w-4xl">
                <button onclick="filterCategory('premium')" class="category-tab active" id="tab-premium">Premium</button>
                <button onclick="filterCategory('semi-premium')" class="category-tab" id="tab-semi-premium">Semi Premium</button>
                <button onclick="filterCategory('education')" class="category-tab" id="tab-education">Education</button>
            </nav>

            <div class="flex items-center gap-2 bg-white/5 p-1 rounded-xl backdrop-blur-md">
                <button id="price-sort-btn" onclick="togglePriceSort()" class="sort-tab">Harga ↑</button>
                <button onclick="sortProducts('sales')" class="sort-tab active" id="sort-sales">Terlaris</button>
                <button onclick="sortProducts('fav')" class="sort-tab" id="sort-fav">Favorit</button>
            </div>
        </div>
    </div>

    <!-- Product Grid -->
    <main class="container mx-auto px-6 pb-32">
        <div id="loading-state" class="flex flex-col items-center py-20">
            <div class="spinner mb-4"></div>
            <p class="text-gold text-xs tracking-widest uppercase animate-pulse">Menyelaraskan Data Katalog...</p>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden"></div>

        <div id="error-state" class="hidden text-center py-20">
            <p class="text-red-400 mb-4">Maaf, terjadi kendala saat memuat data.</p>
            <button onclick="initApp()" class="btn-diraja px-6 py-2 rounded-full text-xs uppercase">Coba Lagi</button>
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9-bTM9z7Fpx0t93QLt355DyWkoIIVpqb5gEsz84cYzweI4WJLd5SZZU-YeIuzcw/pub?gid=1711013733&single=true&output=csv";
        
        let allProducts = [];
        let currentFilter = 'premium';
        let currentSort = 'sales'; 
        let priceDirection = 'up';

        async function initApp() {
            showLoading(true);
            try {
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network error');
                const rawData = await response.text();
                allProducts = parseCSV(rawData);
                showLoading(false);
                renderProducts();
            } catch (error) {
                console.error("Fetch error:", error);
                showError(true);
            }
        }

        function cleanAndShorten(text, maxLength = 32) {
            if (!text) return "Produk Diraja";
            let clean = text.replace(/^["'\s]+|["'\s]+$/g, '').trim();
            if (clean.length <= maxLength) return clean;
            return clean.substring(0, maxLength).trim() + "...";
        }

        function parseCSV(csvText) {
            const rows = csvText.split(/\r?\n/);
            const rawItems = [];
            const seenNames = new Set();

            rows.slice(1).forEach((row, index) => {
                if (!row || row.trim() === "") return;

                const cols = [];
                let current = "";
                let inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    const char = row[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cols.push(current);
                        current = "";
                    } else {
                        current += char;
                    }
                }
                cols.push(current);

                const cleanCols = cols.map(c => c.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                
                const rawName = cleanCols[0];
                if (!rawName) return;

                const normalizedName = rawName.toLowerCase().replace(/\s+/g, '');
                if (seenNames.has(normalizedName)) return; 
                
                const priceValue = parseInt(cleanCols[2]?.replace(/[^0-9]/g, '')) || 0;
                if (priceValue <= 0) return;

                seenNames.add(normalizedName);

                const imageGallery = [];
                for (let i = 3; i <= 12; i++) {
                    const url = cleanCols[i];
                    if (url && (url.startsWith('http') || url.startsWith('https'))) {
                        imageGallery.push(url);
                    }
                }

                let priceCategory = "education";
                if (priceValue > 2000000) {
                    priceCategory = "premium";
                } else if (priceValue >= 1000000) {
                    priceCategory = "semi-premium";
                }

                // Logika Bintang Bervariasi (4.0 - 5.0)
                let rawFav = parseFloat(cleanCols[14]) || 0;
                let favValue;
                if (rawFav >= 4) {
                    favValue = rawFav;
                } else {
                    favValue = (4 + Math.random()).toFixed(1);
                }

                // Mengambil Link dari Kolom N (Indeks 13)
                const productLink = cleanCols[13] || "#";

                rawItems.push({
                    id: `prod-${index}`,
                    name: cleanAndShorten(rawName, 32),
                    fullName: rawName.replace(/^["']|["']$/g, ''),
                    priceCategory: priceCategory,
                    price: priceValue,
                    sales: parseInt(cleanCols[13]) || 0, // Ini mungkin tertukar jika N adalah link, sesuaikan jika perlu
                    fav: favValue,
                    link: productLink,
                    desc: cleanCols[15] || "Tablet unggulan dengan spesifikasi terbaik untuk produktivitas Anda.",
                    images: imageGallery.length > 0 ? imageGallery : ["https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=600"],
                    currentImgIndex: 0
                });
            });

            return rawItems;
        }

        function showLoading(show) {
            document.getElementById('loading-state').classList.toggle('hidden', !show);
            document.getElementById('product-grid').classList.toggle('hidden', show);
            document.getElementById('error-state').classList.add('hidden');
        }

        function showError(show) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('product-grid').classList.add('hidden');
            document.getElementById('error-state').classList.toggle('hidden', !show);
        }

        function togglePriceSort() {
            priceDirection = (priceDirection === 'up') ? 'down' : 'up';
            document.getElementById('price-sort-btn').innerText = `Harga ${priceDirection === 'up' ? '↑' : '↓'}`;
            sortProducts(priceDirection === 'up' ? 'price-up' : 'price-down');
        }

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-tab').forEach(t => {
                t.classList.toggle('active', t.id === 'tab-' + cat);
            });
            renderProducts();
        }

        function sortProducts(criteria) {
            currentSort = criteria;
            document.querySelectorAll('.sort-tab').forEach(t => {
                const isPrice = criteria.startsWith('price') && t.id === 'price-sort-btn';
                const isTarget = t.id === 'sort-' + criteria;
                t.classList.toggle('active', isPrice || isTarget);
            });
            renderProducts();
        }

        window.changeImage = function(productId, direction, event) {
            if (event) event.stopPropagation();
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            product.currentImgIndex += direction;
            if (product.currentImgIndex >= product.images.length) product.currentImgIndex = 0;
            if (product.currentImgIndex < 0) product.currentImgIndex = product.images.length - 1;

            const imgElement = document.getElementById(`img-${productId}`);
            const dotContainer = document.getElementById(`dots-${productId}`);
            
            if (imgElement) imgElement.src = product.images[product.currentImgIndex];
            
            if (dotContainer) {
                Array.from(dotContainer.children).forEach((dot, idx) => {
                    dot.style.opacity = idx === product.currentImgIndex ? '1' : '0.3';
                });
            }
        };

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            let filtered = allProducts.filter(p => p.priceCategory === currentFilter);

            filtered.sort((a, b) => {
                if (currentSort === 'price-up') return a.price - b.price;
                if (currentSort === 'price-down') return b.price - a.price;
                if (currentSort === 'sales') return b.sales - a.sales;
                if (currentSort === 'fav') return b.fav - a.fav;
                return 0;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-white/20 italic">Produk belum tersedia di kategori ini.</div>`;
                return;
            }

            filtered.forEach((p) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-[2.5rem] overflow-hidden group flex flex-col h-full';
                const dots = p.images.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full bg-white transition-opacity duration-300" style="opacity: ${i === 0 ? '1' : '0.3'}"></div>`).join('');

                let badgeText = "Premium";
                let badgeColor = "bg-purple-500 text-white";
                
                if (p.priceCategory === "semi-premium") {
                    badgeText = "Semi Premium";
                    badgeColor = "bg-gold text-blue-900";
                } else if (p.priceCategory === "education") {
                    badgeText = "Education";
                    badgeColor = "bg-blue-500 text-white";
                }

                card.innerHTML = `
                    <div class="relative h-80 bg-black/20 flex items-center justify-center p-6 overflow-hidden">
                        <img id="img-${p.id}" src="${p.images[0]}" class="max-h-full max-w-full object-contain drop-shadow-2xl transition-all duration-500 group-hover:scale-110" alt="[Gambar ${p.fullName}]" onerror="this.src='https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=600'">
                        
                        ${p.images.length > 1 ? `
                            <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 flex justify-between pointer-events-none">
                                <button onclick="changeImage('${p.id}', -1, event)" class="carousel-btn pointer-events-auto hover:bg-gold hover:text-blue-900 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                </button>
                                <button onclick="changeImage('${p.id}', 1, event)" class="carousel-btn pointer-events-auto hover:bg-gold hover:text-blue-900 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                </button>
                            </div>
                            <div id="dots-${p.id}" class="absolute bottom-6 flex gap-1.5 bg-black/20 px-3 py-1.5 rounded-full backdrop-blur-sm">
                                ${dots}
                            </div>
                        ` : ''}

                        <span class="absolute top-6 left-6 ${badgeColor} text-[10px] font-extrabold px-4 py-1.5 rounded-full uppercase tracking-widest shadow-xl">${badgeText}</span>
                    </div>

                    <div class="p-8 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-extrabold text-lg leading-tight uppercase tracking-wide text-white group-hover:text-gold transition-colors" title="${p.fullName}">${p.name}</h3>
                            <div class="flex items-center gap-1 text-gold font-bold bg-gold/10 px-2 py-1 rounded-lg">
                                <span>★</span><span>${p.fav}</span>
                            </div>
                        </div>
                        
                        <p class="text-white/50 text-sm mb-8 line-clamp-3 italic flex-grow leading-relaxed">"${p.desc}"</p>
                        
                        <div class="flex items-center justify-between mt-auto border-t border-white/10 pt-6">
                            <div>
                                <p class="text-[11px] text-gold/60 uppercase font-bold tracking-widest mb-1">Mahar Diraja</p>
                                <p class="text-2xl font-black text-white">${new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(p.price)}</p>
                            </div>
                            <!-- Tombol Panah Sekarang Mengarah ke Link di Kolom N -->
                            <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="btn-diraja w-14 h-14 rounded-2xl shadow-2xl hover:scale-110 hover:-rotate-6 active:scale-95 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
