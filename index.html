<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diraja Tabs Store - Spek Premium & Harga Merakyat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #001a33;
            --gold: #d4af37;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--royal-blue);
            color: #fff;
            overflow-x: hidden;
        }

        .mega-mendung-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(51, 153, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 51, 102, 0.3) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
        }

        .royal-text {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(to right, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-diraja {
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            color: #001a33;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-tab {
            cursor: pointer;
            padding: 10px 24px;
            border-radius: 50px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .category-tab.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.15);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .slider-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
        }
        .slide {
            min-width: 100%;
            height: 100%;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .slider-btn:hover { background: rgba(212, 175, 55, 0.8); color: #001a33; }
        .slider-btn.prev { left: 15px; }
        .slider-btn.next { right: 15px; }
        .dots-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 0.3s;
        }
        .dot.active {
            background: var(--gold);
            transform: scale(1.3);
        }
    </style>
</head>
<body onload="initApp()">

    <div class="mega-mendung-bg"></div>

    <!-- Header -->
    <header class="container mx-auto px-6 py-16 text-center">
        <h1 class="text-5xl md:text-7xl royal-text font-bold mb-4 tracking-tighter">Diraja Tabs Store</h1>
        <p class="text-blue-200/60 text-lg md:text-xl italic">Spek Sultan, Mahar Merakyat</p>
    </header>

    <!-- Filter -->
    <div class="container mx-auto px-6 mb-12">
        <div class="flex flex-col items-center space-y-8">
            <nav class="flex gap-3 overflow-x-auto pb-2 no-scrollbar w-full justify-start md:justify-center">
                <button onclick="filterBy('premium')" class="category-tab" id="tab-premium">Premium</button>
                <button onclick="filterBy('semi-premium')" class="category-tab" id="tab-semi-premium">Semi Premium</button>
                <button onclick="filterBy('education')" class="category-tab" id="tab-education">Education</button>
            </nav>
            
            <div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-2xl backdrop-blur-md border border-white/5">
                <button onclick="toggleSort()" id="sort-price" class="text-[10px] font-bold uppercase tracking-widest text-gold transition-colors">Harga ↑</button>
                <div class="w-[1px] h-3 bg-white/10"></div>
                <button onclick="setSort('sales')" id="sort-sales" class="text-[10px] font-bold uppercase tracking-widest text-white/40 hover:text-gold">Terlaris</button>
            </div>
        </div>
    </div>

    <!-- Grid Produk -->
    <main class="container mx-auto px-6 pb-24">
        <div id="loader" class="flex flex-col items-center py-20">
            <div class="spinner mb-4"></div>
            <p id="loader-text" class="text-gold text-[10px] uppercase tracking-[0.4em] animate-pulse">Menghubungkan ke Gudang Diraja...</p>
            <button id="retry-btn" onclick="fetchFreshData()" class="hidden mt-4 px-6 py-2 border border-gold text-gold text-[10px] uppercase tracking-widest rounded-full hover:bg-gold hover:text-royal-blue transition-all">Muat Ulang Paksa</button>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden"></div>
    </main>

    <!-- Modal Detail -->
    <div id="product-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md opacity-0 flex transition-opacity duration-300">
        <div class="relative w-full max-w-5xl bg-[#001f3f] rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-[110] p-2 bg-black/20 rounded-full text-white/50 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
            
            <div class="md:w-1/2 bg-black/20 p-0 flex items-center justify-center min-h-[350px] overflow-hidden relative" id="modal-image-container"></div>

            <div id="modal-content-section" class="md:w-1/2 p-8 md:p-12 overflow-y-auto no-scrollbar flex flex-col"></div>
        </div>
    </div>

    <footer class="py-12 text-center text-white/20 border-t border-white/5">
        <p class="text-[10px] uppercase tracking-[0.3em]">&copy; 2024 Diraja Tabs Store</p>
    </footer>

    <script>
        // URL spreadsheet dipastikan menggunakan format pub?output=csv untuk meminimalkan masalah CORS
        const DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9-bTM9z7Fpx0t93QLt355DyWkoIIVpqb5gEsz84cYzweI4WJLd5SZZU-YeIuzcw/pub?gid=1711013733&single=true&output=csv";
        const FALLBACK_IMG = `data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='2' width='16' height='20' rx='2' ry='2'%3E%3C/rect%3E%3Cline x1='12' y1='18' x2='12.01' y2='18'%3E%3C/line%3E%3C/svg%3E`;
        const CACHE_KEY = "diraja_products_cache_v2";
        const CACHE_EXPIRY = 1800000; // 30 menit

        let allProducts = [];
        let currentFilter = 'premium'; 
        let sortCriteria = 'price'; 
        let priceOrder = 'asc';
        let currentSlideIndex = 0;

        async function initApp() {
            const cachedData = localStorage.getItem(CACHE_KEY);
            const cacheTime = localStorage.getItem(CACHE_KEY + "_time");
            
            if (cachedData && cacheTime && (Date.now() - parseInt(cacheTime) < CACHE_EXPIRY)) {
                try {
                    allProducts = JSON.parse(cachedData);
                    if (allProducts.length > 0) {
                        displayProducts();
                        // Update background
                        fetchFreshData(true);
                        return;
                    }
                } catch(e) {
                    localStorage.removeItem(CACHE_KEY);
                }
            }
            fetchFreshData();
        }

        async function fetchFreshData(isBackground = false) {
            if (!isBackground) {
                document.getElementById('loader').classList.remove('hidden');
                document.getElementById('retry-btn').classList.add('hidden');
                document.getElementById('loader-text').innerText = "Menghubungkan ke Gudang Diraja...";
            }

            try {
                // Gunakan cache buster unik
                const timestamp = new Date().getTime();
                const res = await fetch(`${DATA_URL}&cache_buster=${timestamp}`, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'omit'
                });

                if (!res.ok) throw new Error("Server spreadsheet tidak merespon");

                const csv = await res.text();
                const parsed = parseCSV(csv);
                
                if (parsed.length > 0) {
                    allProducts = parsed;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(allProducts));
                    localStorage.setItem(CACHE_KEY + "_time", Date.now().toString());
                    displayProducts();
                } else {
                    throw new Error("Data kosong setelah di-parsing");
                }
            } catch (e) {
                console.error("Fetch error:", e);
                if (!isBackground && allProducts.length === 0) {
                    document.getElementById('loader-text').innerText = "Gagal memuat data. Pastikan Spreadsheet dipublikasikan ke Web sebagai CSV.";
                    document.getElementById('retry-btn').classList.remove('hidden');
                }
            }
        }

        function displayProducts() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('product-grid').classList.remove('hidden');
            render();
        }

        function cleanText(text) {
            if (!text) return "";
            // Menghilangkan BOM dan karakter aneh lainnya
            return text.replace(/^\uFEFF/, '').replace(/^["'\s]+|["'\s]+$/g, '').trim();
        }

        function cleanImageUrl(url) {
            if (!url) return null;
            let clean = url.trim().replace(/^"|"$/g, '');
            if (!clean.toLowerCase().startsWith('http')) return null;
            return clean;
        }

        function parseCSV(text) {
            if (!text || text.length < 10) return [];
            
            const lines = text.split(/\r?\n/);
            const result = [];
            const seen = new Set();

            // Mulai dari indeks 1 untuk melewati header
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = [];
                let cell = '';
                let inQuotes = false;
                
                for(let char of line) {
                    if(char === '"') inQuotes = !inQuotes;
                    else if(char === ',' && !inQuotes) { cols.push(cell); cell = ''; }
                    else cell += char;
                }
                cols.push(cell);

                const name = cleanText(cols[0]);
                const priceRaw = cols[2] ? cols[2].toString().replace(/\D/g, '') : "0";
                const price = parseInt(priceRaw);

                // Validasi minimal: Nama ada dan harga di atas 500rb
                if(!name || isNaN(price) || price < 500000 || seen.has(name)) continue;
                seen.add(name);

                let category = 'education';
                if (price > 3000000) category = 'premium';
                else if (price >= 2000000) category = 'semi-premium';

                const fullDesc = cleanText(cols[14]) || "Deskripsi produk eksklusif Diraja.";
                
                const imgs = [];
                // Cek kolom D sampai M (index 3 sampai 12)
                for(let k=3; k<=12; k++) {
                    let imgUrl = cleanImageUrl(cols[k]);
                    if(imgUrl) imgs.push(imgUrl);
                }

                result.push({
                    id: `prod-${i}`,
                    name: name,
                    price: price,
                    category: category,
                    images: imgs.length ? imgs : [FALLBACK_IMG],
                    link: cols[13] ? cleanText(cols[13]) : '#',
                    description: fullDesc,
                    sales: Math.floor(Math.random() * 500) + 20
                });
            }
            return result;
        }

        function filterBy(cat) {
            currentFilter = (currentFilter === cat) ? 'semua' : cat;
            document.querySelectorAll('.category-tab').forEach(t => {
                t.classList.toggle('active', t.id === `tab-${currentFilter}`);
            });
            render();
        }

        function toggleSort() {
            sortCriteria = 'price';
            priceOrder = priceOrder === 'asc' ? 'desc' : 'asc';
            document.getElementById('sort-price').innerText = `Harga ${priceOrder === 'asc' ? '↑' : '↓'}`;
            render();
        }

        function setSort(type) {
            sortCriteria = type;
            render();
        }

        function handleImgError(img) {
            img.onerror = null;
            img.src = FALLBACK_IMG;
            img.className = 'w-full h-full object-contain p-12 opacity-20';
        }

        function moveSlide(direction, totalSlides) {
            currentSlideIndex = (currentSlideIndex + direction + totalSlides) % totalSlides;
            const track = document.getElementById('slider-track');
            if (track) {
                track.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
                const dots = document.querySelectorAll('.dot');
                dots.forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === currentSlideIndex);
                });
            }
        }

        function openModal(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            const modal = document.getElementById('product-modal');
            currentSlideIndex = 0;

            let sliderHTML = `
                <div class="slider-container">
                    <div class="slider-track" id="slider-track">
                        ${p.images.map(img => `
                            <div class="slide">
                                <img src="${img}" loading="lazy" onerror="handleImgError(this)" alt="${p.name}">
                            </div>
                        `).join('')}
                    </div>
            `;

            if (p.images.length > 1) {
                sliderHTML += `
                    <button class="slider-btn prev" onclick="moveSlide(-1, ${p.images.length})">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <button class="slider-btn next" onclick="moveSlide(1, ${p.images.length})">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l6 6-6 6"/></svg>
                    </button>
                    <div class="dots-container">
                        ${p.images.map((_, idx) => `<div class="dot ${idx === 0 ? 'active' : ''}" onclick="currentSlideIndex=${idx}; moveSlide(0, ${p.images.length})"></div>`).join('')}
                    </div>
                `;
            }
            sliderHTML += `</div>`;
            document.getElementById('modal-image-container').innerHTML = sliderHTML;

            document.getElementById('modal-content-section').innerHTML = `
                <div class="mb-6">
                    <span class="text-[10px] font-black text-gold uppercase tracking-[0.3em] mb-2 block">${p.category.replace('-', ' ')} Series</span>
                    <h2 class="text-2xl md:text-3xl font-black leading-tight mb-4">${p.name}</h2>
                    <p class="text-4xl font-light text-white mb-8">${new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(p.price)}</p>
                </div>
                <div class="space-y-4 mb-10">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-white/40">Spesifikasi & Deskripsi</h3>
                    <p class="text-white/70 leading-relaxed text-sm whitespace-pre-line">${p.description}</p>
                </div>
                <div class="mt-auto pt-8">
                    <a href="${p.link}" target="_blank" class="btn-diraja w-full py-5 rounded-2xl text-sm tracking-[0.2em] shadow-xl">PINANG SEKARANG</a>
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('opacity-100'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
            document.body.style.overflow = '';
        }

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            let filtered = allProducts;
            if(currentFilter !== 'semua') {
                filtered = allProducts.filter(p => p.category === currentFilter);
            }
            
            filtered.sort((a, b) => {
                if(sortCriteria === 'sales') return b.sales - a.sales;
                return priceOrder === 'asc' ? a.price - b.price : b.price - a.price;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-white/20 uppercase tracking-widest text-xs">Produk tidak ditemukan</div>`;
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-[2rem] overflow-hidden flex flex-col h-full group';
                card.onclick = () => openModal(p.id);
                card.innerHTML = `
                    <div class="h-64 bg-black/20 relative w-full overflow-hidden">
                        <img src="${p.images[0]}" 
                             loading="lazy"
                             onerror="handleImgError(this)"
                             class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" 
                             alt="${p.name}">
                        <div class="absolute top-4 left-4 bg-black/60 text-[8px] font-bold px-3 py-1 rounded-full uppercase border border-white/10 backdrop-blur-md z-10">
                            ${p.category.replace('-', ' ')}
                        </div>
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <h3 class="font-bold text-base mb-2 line-clamp-2 leading-snug group-hover:text-gold transition-colors">${p.name}</h3>
                        <p class="text-xl font-black text-gold mb-6">${new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(p.price)}</p>
                        <div class="mt-auto pt-4 border-t border-white/5 flex items-center justify-between">
                            <span class="text-[9px] font-bold text-white/30 uppercase tracking-widest">Detail Produk</span>
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gold group-hover:bg-gold group-hover:text-royal-blue transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
